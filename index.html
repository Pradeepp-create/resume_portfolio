<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pradeep · Journey Resume</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="journey-container">
    <!-- LEFT SIDE: Road & Bus -->
    <div class="left-side">
      <div class="sky"></div>
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>

      <div class="road-container">
        <div class="road" id="road">
          <!-- Stops -->
          <div class="stop" data-section="intro"></div>
          <div class="stop" data-section="objective"></div>
          <div class="stop" data-section="education"></div>
          <div class="stop" data-section="skills"></div>
          <div class="stop" data-section="experience"></div>
          <div class="stop" data-section="projects"></div>
          <div class="stop" data-section="certificates"></div>
          <div class="stop" data-section="contact"></div>
          <div class="stop" data-section="technical"></div>
          <div class="stop" data-section="journey-complete"></div>
        </div>
      </div>

      <div class="bus">
        <div class="bus-body">
          <div class="window"></div>
          <div class="window"></div>
          <div class="window"></div>
          <div class="window window-small"></div>
        </div>
        <div class="wheel wheel-left"></div>
        <div class="wheel wheel-right"></div>
      </div>

      <!-- Progress bar -->
      <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
        <div class="progress-dots" id="dots"></div>
      </div>
    </div>

    <!-- RIGHT SIDE: Popup Card -->
    <div class="right-side">
      <div class="card" id="card">
        <div class="card-content">
          <h2 id="card-title">Intro</h2>
          <div id="card-text"></两位 onclick="nextSection()">Next</div>
        </div>
      </div>

      <div class="card-buttons">
        <button id="prev-btn" class="nav-btn">← Previous</button>
        <button id="next-btn" class="nav-btn">Next →</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
