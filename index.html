<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pradeep M · Journey Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="journey-container">
    <!-- LEFT: Road + Bus -->
    <div class="left-side">
      <div class="sky"></div>
      
      <!-- SUN INSTEAD OF CLOUDS -->
      <div class="sun"></div>

      <div class="road-wrapper">
        <div class="road" id="road">
          <div class="stop active" data-section="0"></div>
          <div class="stop" data-section="1"></div>
          <div class="stop" data-section="2"></div>
          <div class="stop" data-section="3"></div>
          <div class="stop" data-section="4"></div>
          <div class="stop" data-section="5"></div>
          <div class="stop" data-section="6"></div>
          <div class="stop" data-section="7"></div>
          <div class="stop" data-section="8"></div>
          <div class="stop" data-section="9"></div>
        </div>
      </div>

      <div class="bus" id="bus">
        <div class="bus-body">
          <div class="bus-main"></div>
          <div class="bus-windows">
            <div class="window"></div>
            <div class="window"></div>
            <div class="window"></div>
          </div>
          <div class="bus-door"></div>
        </div>
        <div class="wheel front-wheel"></div>
        <div class="wheel rear-wheel"></div>
      </div>

      <div class="progress-section">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-dots" id="progressDots"></div>
      </div>
    </div>

    <!-- RIGHT: CONTENT -->
    <div class="right-side">
      <div class="glass-card" id="glassCard">
        <div class="card-header">
          <h1 id="cardTitle">Welcome</h1>
          <div class="section-number" id="sectionNum">Stop 1/10</div>
        </div>
        <div class="card-content" id="cardContent">
          Loading journey...
        </div>
      </div>
      
      <div class="nav-buttons">
        <button id="prevBtn" class="nav-btn disabled">← Previous</button>
        <button id="nextBtn" class="nav-btn">Next →</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
