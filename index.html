<!DOCTYPE html>
<html>
<head>
<title>Journey Portfolio</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="journey">

  <!-- LEFT SIDE (ROAD + BUS) -->
  <div class="road-container">

    <!-- CLOUDS -->
    <div class="cloud cloud--xl"></div>
    <div class="cloud cloud--lg"></div>
    <div class="cloud cloud--md"></div>
    <div class="cloud cloud--sm"></div>

    <!-- ROAD SVG -->
    <svg class="road-svg" viewBox="0 0 1000 500">
      <path id="roadPath" d="M50 400 Q300 100 600 350 T950 200"></path>
      <path class="road-dash" d="M50 400 Q300 100 600 350 T950 200"></path>
    </svg>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-dots" id="progressDots"></div>

    <!-- BUS -->
    <div id="bus">
      <div class="bus-body"></div>
      <div class="wheel wheel1"></div>
      <div class="wheel wheel2"></div>
      <div class="bus-shadow"></div>
    </div>

    <!-- STOPS -->
    <div class="stop" style="left:5%" onclick="goToStop(0)">Intro</div>
    <div class="stop" style="left:15%" onclick="goToStop(1)">Objective</div>
    <div class="stop" style="left:25%" onclick="goToStop(2)">Education</div>
    <div class="stop" style="left:35%" onclick="goToStop(3)">Skills</div>
    <div class="stop" style="left:45%" onclick="goToStop(4)">Experience</div>
    <div class="stop" style="left:55%" onclick="goToStop(5)">Projects</div>
    <div class="stop" style="left:65%" onclick="goToStop(6)">Certificates</div>
    <div class="stop" style="left:75%" onclick="goToStop(7)">Contact</div>
    <div class="stop" style="left:85%" onclick="goToStop(8)">Tech Stack</div>
    <div class="stop" style="left:95%" onclick="goToStop(9)">Finish</div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="popup">
    <div class="popup-card fade-in">

      <div class="popup-header">
        <div class="popup-avatar">P</div>
        <div>
          <h3 id="title">Start</h3>
          <div class="popup-sub">Your journey begins here</div>
        </div>
      </div>

      <div class="popup-body" id="desc">
Welcome to my interactive portfolio 🚀
Click stops to explore.
      </div>

      <div class="nav-btns">
        <button onclick="prevStop()">⬅ Prev</button>
        <button onclick="nextStop()">Next ➡</button>
      </div>

    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
